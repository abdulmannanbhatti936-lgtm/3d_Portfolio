<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdul Mannan — Space Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000005; }
:root {
  --bg-primary: #020617;
  --bg-panel: rgba(10, 18, 34, 0.92);
  --text-primary: #e5ecff;
  --text-secondary: rgba(229,236,255,0.72);
  --text-muted: rgba(192,206,235,0.56);
  --accent: #7dd3fc;
  --accent-strong: #38bdf8;
  --accent-soft: rgba(125,211,252,0.3);
  --danger-soft: rgba(255,120,120,0.75);
}

body {
  font-family: 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
  cursor: none;
  user-select: none;
  color: var(--text-primary);
}

#canvas { position: fixed; inset: 0; display: block; width: 100%; height: 100%; z-index: 0; }

/* Cursor */
#cursor {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: screen;
}
.cursor-core {
  position: absolute;
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: transform 0.1s;
}
.cursor-ring {
  position: absolute;
  width: 24px; height: 24px;
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: all 0.2s ease;
}
.cursor-trail {
  position: absolute;
  width: 4px; height: 4px;
  background: rgba(100,180,255,0.6);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* HUD */
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 20px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(0,0,5,0.8) 0%, transparent 100%);
}
.hud-logo {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.hud-logo span { color: var(--accent-strong); }
.hud-coords {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}
.hud-hint {
  font-size: 10px;
  color: rgba(125,211,252,0.65);
  letter-spacing: 0.08em;
  animation: blink 2s ease infinite;
  text-transform: uppercase;
}
@keyframes blink { 0%,100%{opacity:0.25} 50%{opacity:0.6} }

/* Planet label tooltip */
#planet-label {
  position: fixed;
  pointer-events: none;
  z-index: 200;
  padding: 8px 14px;
  background: rgba(8, 17, 33, 0.92);
  border: 1px solid var(--accent-soft);
  border-radius: 8px;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: none;
  transition: opacity 0.2s;
}

#ux-toast {
  position: fixed;
  left: 50%;
  bottom: 86px;
  transform: translate(-50%, 20px);
  z-index: 250;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.78);
  border: 1px solid rgba(100,180,255,0.28);
  background: rgba(0,8,24,0.88);
  padding: 8px 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s ease, transform 0.28s ease;
}
#ux-toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
}

/* Panel overlay */
#panel {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(2, 8, 22, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  backdrop-filter: blur(12px);
}
#panel.active { opacity: 1; pointer-events: all; }

.panel-inner {
  width: min(720px, 90vw);
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid var(--accent-soft);
  background: var(--bg-panel);
  padding: 48px;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: rgba(100,180,255,0.3) transparent;
}
.panel-inner::-webkit-scrollbar { width: 4px; }
.panel-inner::-webkit-scrollbar-track { background: transparent; }
.panel-inner::-webkit-scrollbar-thumb { background: rgba(100,180,255,0.3); }

.panel-corner {
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--accent-strong);
  border-style: solid;
  opacity: 0.6;
}
.panel-corner.tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
.panel-corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
.panel-corner.bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
.panel-corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

.panel-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 32px; height: 32px;
  background: transparent;
  border: 1px solid var(--accent-soft);
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-family: inherit;
}
.panel-close:hover { border-color: rgba(125,211,252,0.7); color: var(--accent); }

.panel-tag {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.7;
  margin-bottom: 16px;
}
.panel-title {
  font-family: 'Inter', sans-serif;
  font-size: clamp(24px, 4vw, 40px);
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 28px;
  letter-spacing: 0.01em;
  line-height: 1.1;
}
.panel-body {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-secondary);
  margin-bottom: 32px;
}
.panel-divider {
  height: 1px;
  background: linear-gradient(to right, #7dd3fc1f, #7dd3fc66, #7dd3fc1f);
  margin: 28px 0;
}

/* Cards inside panel */
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card {
  padding: 18px;
  border: 1px solid rgba(125,211,252,0.14);
  background: rgba(125,211,252,0.04);
  transition: border-color 0.3s;
}
.card:hover { border-color: rgba(125,211,252,0.38); }
.card-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(125,211,252,0.8); margin-bottom: 8px; font-weight: 600; }
.card-value { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 800; color: var(--text-primary); line-height: 1.1; }
.card-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

/* Skill bars */
.skill-row { margin-bottom: 14px; }
.skill-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: var(--text-secondary); font-weight: 500; }
.skill-pct { color: var(--accent); font-weight: 700; }
.skill-track { height: 4px; background: rgba(255,255,255,0.08); position: relative; border-radius: 99px; }
.skill-fill { height: 100%; background: linear-gradient(to right, #38bdf8, #7dd3fc); width: 0; transition: width 1s ease; position: relative; border-radius: 99px; }
.skill-fill::after { content:''; position:absolute; right:-2px; top:-3px; width:10px; height:10px; background:#bae6fd; border-radius:50%; box-shadow:0 0 10px #38bdf8; }

/* Project cards */
.proj-grid { display: grid; gap: 12px; }
.proj-card {
  padding: 24px;
  border: 1px solid rgba(125,211,252,0.14);
  background: rgba(8, 17, 33, 0.55);
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.3s;
}
.proj-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(to bottom, #4ab8ff, transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.proj-card:hover { border-color: rgba(125,211,252,0.38); transform: translateX(4px); }
.proj-card:hover::before { opacity: 1; }
.proj-name { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
.proj-desc { font-size: 14px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 14px; }
.proj-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.proj-tag { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border: 1px solid rgba(125,211,252,0.3); color: rgba(125,211,252,0.95); border-radius: 999px; }

/* Contact links */
.contact-links { display: flex; gap: 12px; flex-wrap: wrap; }
.contact-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 22px;
  border: 1px solid rgba(125,211,252,0.3);
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s;
}
.contact-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(125,211,252,0.08); }
.contact-btn.primary { background: rgba(56,189,248,0.18); border-color: rgba(125,211,252,0.55); color: #d9f3ff; }

/* Form Styling */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.form-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.8;
}
.form-input, .form-textarea {
  width: 100%;
  padding: 12px 16px;
  background: rgba(10, 18, 34, 0.6);
  border: 1px solid rgba(125,211,252,0.2);
  border-radius: 4px;
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: all 0.3s;
}
.form-input:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent-strong);
  background: rgba(10, 18, 34, 0.8);
  box-shadow: 0 0 10px rgba(56,189,248,0.1);
}
.form-textarea {
  min-height: 120px;
  resize: vertical;
}
.form-submit {
  align-self: flex-start;
  padding: 14px 32px;
  background: rgba(56,189,248,0.2);
  border: 1px solid var(--accent);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
}
.form-submit:hover {
  background: var(--accent-strong);
  color: #000;
  box-shadow: 0 0 15px var(--accent-soft);
}


/* Bottom HUD */
#bottom-hud {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  padding: 16px 32px;
  background: linear-gradient(to top, rgba(0,0,5,0.8) 0%, transparent 100%);
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 16px 32px;
}
.nav-planet {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.3s;
  padding: 4px 0;
  border: none;
  background: transparent;
  font-family: inherit;
}
.nav-planet:hover { color: var(--accent); }
.nav-planet.active { color: var(--accent); }

@media (max-width: 900px) {
  #hud {
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }
  .hud-logo { font-size: 12px; letter-spacing: 0.16em; }
  .hud-coords { font-size: 10px; letter-spacing: 0.11em; }
  .hud-hint { font-size: 9px; letter-spacing: 0.08em; }

  #bottom-hud {
    justify-content: flex-start;
    gap: 10px;
    padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #bottom-hud::-webkit-scrollbar { display: none; }
  .nav-planet {
    flex: 0 0 auto;
    font-size: 9px;
    white-space: nowrap;
    padding: 6px 8px;
  }

  .panel-inner {
    width: min(100vw - 24px, 720px);
    max-height: min(82vh, 760px);
    padding: 38px 20px 24px;
  }
  .panel-title { margin-bottom: 20px; }
  .card-grid { grid-template-columns: 1fr; }
  .contact-links { gap: 8px; }
  .contact-btn { width: 100%; justify-content: center; }
  .form-submit { width: 100%; justify-content: center; }
  .form-input, .form-textarea { font-size: 16px; }
}

@media (pointer: coarse) {
  body { cursor: auto; }
  #cursor { display: none; }
  #planet-label { display: none !important; }
  #ux-toast { bottom: 74px; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="cursor">
  <div class="cursor-core"></div>
  <div class="cursor-ring"></div>
</div>
<div id="planet-label"></div>
<div id="ux-toast">Tap a planet to open details</div>

<div id="hud">
  <div class="hud-logo">AM<span>.</span>DEV</div>
  <div class="hud-coords" id="hud-coords">X: 0.000 | Y: 0.000</div>
  <div class="hud-hint">CLICK PLANET TO EXPLORE</div>
</div>

<div id="bottom-hud">
  <button class="nav-planet" data-id="about">About</button>
  <button class="nav-planet" data-id="skills">Skills</button>
  <button class="nav-planet" data-id="projects">Projects</button>
  <button class="nav-planet" data-id="services">Services</button>
  <button class="nav-planet" data-id="experience">Experience</button>
  <button class="nav-planet" data-id="education">Education</button>
  <button class="nav-planet" data-id="languages">Languages</button>
  <button class="nav-planet" data-id="contact">Contact</button>
  <button class="nav-planet" data-id="resume">Resume</button>
</div>

<!-- Panel -->
<div id="panel">
  <div class="panel-inner">
    <div class="panel-corner tl"></div>
    <div class="panel-corner tr"></div>
    <div class="panel-corner bl"></div>
    <div class="panel-corner br"></div>
    <button class="panel-close" id="panel-close">✕</button>
    <div id="panel-content"></div>
  </div>
</div>

<script>
// =========================================
// SETUP
// =========================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
if (!ctx) {
  throw new Error('Canvas 2D context is not available.');
}
let W, H;
let orbitScale = 1;
let isTouchDevice = window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Scale orbital system for smaller screens. 
  // designMaxOrbit matches the outermost orbit (Resume) for perfect fit.
  const designMaxOrbit = 660; 
  const availableSpace = Math.min(W, H) * (isTouchDevice ? 0.46 : 0.52);
  orbitScale = Math.min(1.2, availableSpace / designMaxOrbit);
}
resize();
window.addEventListener('resize', resize);

// Mouse
let mx = W/2, my = H/2;
let targetMx = W/2, targetMy = H/2;
document.addEventListener('mousemove', e => {
  targetMx = e.clientX;
  targetMy = e.clientY;
});
document.addEventListener('touchmove', e => {
  if(e.touches.length > 0) {
    targetMx = e.touches[0].clientX;
    targetMy = e.touches[0].clientY;
  }
}, {passive: true});

// Cursor
const cursorEl = document.getElementById('cursor');
const cursorRing = cursorEl.querySelector('.cursor-ring');
const cursorCore = cursorEl.querySelector('.cursor-core');
let cursorX = W/2, cursorY = H/2;
let trails = [];
const labelEl = document.getElementById('planet-label');
const toastEl = document.getElementById('ux-toast');

function updateCursor(x, y) {
  cursorX = x;
  cursorY = y;
  if (!isTouchDevice) {
    cursorEl.style.left = cursorX + 'px';
    cursorEl.style.top = cursorY + 'px';
  }
  if (W && H) {
    document.getElementById('hud-coords').textContent =
      `X: ${((cursorX/W)*2-1).toFixed(3)} | Y: ${((cursorY/H)*2-1).toFixed(3)}`;
  }
  trails.push({ x: cursorX, y: cursorY, life: 1 });
  if (trails.length > 12) trails.shift();
}
updateCursor(W / 2, H / 2);

document.addEventListener('mousemove', e => updateCursor(e.clientX, e.clientY));
document.addEventListener('touchmove', e => {
  if (e.touches.length > 0) {
    updateCursor(e.touches[0].clientX, e.touches[0].clientY);
  }
}, {passive: true});

// =========================================
// STARS
// =========================================
const stars = [];
for (let i = 0; i < 400; i++) {
  const depth = 0.35 + Math.random() * 0.95;
  stars.push({
    x: Math.random() * 3000 - 1500,
    y: Math.random() * 3000 - 1500,
    r: 0.2 + Math.random() * 1.8,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.005 + Math.random() * 0.015,
    drift: (Math.random() - 0.5) * 0.02,
    depth,
  });
}

// =========================================
// SUN
// =========================================
const sun = {
  x: 0, y: 0,
  r: 48,
  label: 'MANNAN',
  pulse: 0,
};

// =========================================
// PLANETS
// =========================================
const PANEL_DATA = {
  about: {
    tag: '// SYS.001',
    title: 'About Me',
    html: `
      <p class="panel-body">
        Abdul Mannan Bhatti — Full Stack Developer and UI/UX Designer from Islamabad, Pakistan.
        I build high-performance web products using PHP, React.js, MySQL, and JavaScript with a
        strong focus on clean architecture and user-centered design.
      </p>
      <div class="panel-divider"></div>
      <div class="card-grid">
        <div class="card"><div class="card-label">Status</div><div class="card-value">Active</div><div class="card-sub">Available for work</div></div>
        <div class="card"><div class="card-label">Semester</div><div class="card-value">6th</div><div class="card-sub">NUML University</div></div>
        <div class="card"><div class="card-label">Projects</div><div class="card-value">6+</div><div class="card-sub">Live & in development</div></div>
        <div class="card"><div class="card-label">Location</div><div class="card-value">ISB</div><div class="card-sub">Islamabad, PK</div></div>
      </div>
      <div class="panel-divider"></div>
      <p class="panel-body" style="margin:0">
        Passionate about building robust backend systems, polished interfaces, and scalable web apps.
        Outside coding: anime, travel/exploration, gaming, and creative writing.
      </p>
    `
  },
  skills: {
    tag: '// SYS.002',
    title: 'Tech Stack',
    html: `
      <p class="panel-body">Core technologies from my active project and freelance workflow.</p>
      <div class="panel-divider"></div>
      <div class="skill-row"><div class="skill-header"><span>PHP / Core PHP</span><span class="skill-pct">90%</span></div><div class="skill-track"><div class="skill-fill" data-w="90"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>MySQL</span><span class="skill-pct">88%</span></div><div class="skill-track"><div class="skill-fill" data-w="88"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>React.js</span><span class="skill-pct">82%</span></div><div class="skill-track"><div class="skill-fill" data-w="82"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>JavaScript</span><span class="skill-pct">82%</span></div><div class="skill-track"><div class="skill-fill" data-w="82"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>HTML5 / CSS3</span><span class="skill-pct">92%</span></div><div class="skill-track"><div class="skill-fill" data-w="92"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>Bootstrap 5</span><span class="skill-pct">88%</span></div><div class="skill-track"><div class="skill-fill" data-w="88"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>Laravel</span><span class="skill-pct">72%</span></div><div class="skill-track"><div class="skill-fill" data-w="72"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>REST APIs</span><span class="skill-pct">78%</span></div><div class="skill-track"><div class="skill-fill" data-w="78"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>Tailwind CSS</span><span class="skill-pct">74%</span></div><div class="skill-track"><div class="skill-fill" data-w="74"></div></div></div>
      <div class="skill-row"><div class="skill-header"><span>UI/UX Design</span><span class="skill-pct">80%</span></div><div class="skill-track"><div class="skill-fill" data-w="80"></div></div></div>
    `
  },
  projects: {
    tag: '// SYS.003',
    title: 'Projects',
    html: `
      <p class="panel-body">Real products from my resume and main portfolio.</p>
      <div class="panel-divider"></div>
      <div class="proj-grid">
        <div class="proj-card">
          <div class="proj-name">MyClinic - Clinic Management System (Live)</div>
          <div class="proj-desc">Patient records, appointments, billing, plus admin dashboard with analytics and reporting.</div>

        </div>

const planets = [
  { id: 'about',      label: 'ABOUT',      orbitR: 150, angle: 0.0, speed: 0.00040, r: 18, color: '#67b7ff', glow: '#67b7ff' },

// =========================================
// ANIMATION STATE
// =========================================
let t = 0;
let camX = 0, camY = 0;
let camTargetX = 0, camTargetY = 0;
let hoveredPlanet = null;
let clickedPlanet = null;

// =========================================
// DRAW HELPERS
// =========================================
function drawStars(cx, cy) {
  stars.forEach(s => {
    s.twinkle += s.speed;
    s.y += s.drift;
    if (s.y > 1500) s.y = -1500;
    if (s.y < -1500) s.y = 1500;

    const sx = s.x + cx * s.depth;
    const sy = s.y + cy * s.depth;
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) return;
    const twinkle = 0.35 + 0.65 * Math.sin(s.twinkle);
    const alphaDepth = 0.45 + 0.55 * s.depth;
    ctx.beginPath();
    ctx.arc(sx, sy, Math.max(0.35, s.r * twinkle), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.95 * alphaDepth})`;
    ctx.fill();
  });
}

function drawOrbitPath(cx, cy, rx, ry, start = 0, end = Math.PI * 2) {
  if (typeof ctx.ellipse === 'function') {
    ctx.ellipse(cx, cy, rx, ry, 0, start, end);
    return;
  }
  // Fallback for older canvas implementations without ellipse.
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(1, ry / rx);
  ctx.arc(0, 0, rx, start, end);
  ctx.restore();
}

function drawOrbit(cx, cy, r, active) {
  const orbitTilt = isTouchDevice ? 0.78 : 0.72;
  ctx.beginPath();
  drawOrbitPath(cx, cy, r, r * orbitTilt);
  ctx.strokeStyle = active ? 'rgba(100,180,255,0.15)' : 'rgba(255,255,255,0.04)';
  ctx.lineWidth = active ? 1 : 0.5;
  ctx.setLineDash(active ? [4, 8] : [2, 12]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawSun(cx, cy) {
  // Keep the sun larger and more imposing
  const sunR = sun.r * Math.max(0.65, orbitScale);
  // Outer glow layers
  [1.6, 1.25, 0.95].forEach((ratio, i) => {
    const r = sunR * ratio;
    const alpha = [0.04, 0.08, 0.12][i];
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, `rgba(255,200,80,${alpha})`);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  // Corona rays
  const pulse = 1 + 0.05 * Math.sin(t * 2);
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 + t * 0.3;
    const r1 = sunR * 1.05 * pulse;
    const r2 = sunR * (1.25 + Math.sin(t * 1.5 + i) * 0.15);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
    ctx.strokeStyle = `rgba(255,210,80,${0.12 + 0.06 * Math.sin(t * 2 + i)})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Core gradient
  const grad = ctx.createRadialGradient(cx - sunR * 0.25, cy - sunR * 0.2, 0, cx, cy, sunR);
  grad.addColorStop(0, '#fff9e8');
  grad.addColorStop(0.3, '#ffd060');
  grad.addColorStop(0.7, '#ff9820');
  grad.addColorStop(1, '#ff6010');
  ctx.beginPath();
  ctx.arc(cx, cy, sunR, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Name on sun
  ctx.fillStyle = 'rgba(40,20,0,0.85)';
  ctx.font = `700 ${Math.max(6, 9 * Math.max(0.6, orbitScale))}px "Inter", "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('MANNAN', cx, cy);
}

// Helper: convert hex color to rgba string
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function drawPlanet(p, cx, cy) {
  const orbitRadius = p.orbitR * orbitScale;
  const orbitTilt = isTouchDevice ? 0.78 : 0.72;
  const perspective = 0.82 + 0.18 * (Math.sin(p.angle) * 0.5 + 0.5);
  const baseX = cx + Math.cos(p.angle) * orbitRadius;
  const baseY = cy + Math.sin(p.angle) * orbitRadius * orbitTilt;
  const dx = baseX - mx;
  const dy = baseY - my;
  const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
  const gravityRange = isTouchDevice ? 180 : 280;
  const rawStrength = Math.max(0, 1 - dist / gravityRange);
  const easedStrength = rawStrength * rawStrength;
  const pull = easedStrength * (isTouchDevice ? 12 : 18);

  const px = baseX - (dx / dist) * pull;
  const py = baseY - (dy / dist) * pull;

  const isHovered = hoveredPlanet === p;
  // Keep planets larger for better visibility and interaction
  const baseR = p.r * Math.max(0.75, orbitScale); 
  const scale = (isHovered ? 1.32 : 1 + easedStrength * 0.1) * perspective;
  const radius = baseR * scale;

  // Glow
  const glowR = radius * 3;
  const grad = ctx.createRadialGradient(px, py, 0, px, py, glowR);
  grad.addColorStop(0, hexToRgba(p.glow, isHovered ? 0.33 : 0.13));
  grad.addColorStop(1, hexToRgba(p.glow, 0));
  ctx.beginPath();
  ctx.arc(px, py, glowR, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Planet body
  if (p.id === 'resume') {
    // Black hole core
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
    
    // Accretion disk effect
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      const dr = radius * (1.2 + i * 0.4);
      ctx.ellipse(px, py, dr, dr * 0.3, p.angle + t * (0.5 + i * 0.2), 0, Math.PI * 2);
      ctx.strokeStyle = hexToRgba(p.glow, 0.15 - i * 0.04);
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  } else {
    const bodyGrad = ctx.createRadialGradient(px - radius * 0.35, py - radius * 0.35, 0, px, py, radius);
    bodyGrad.addColorStop(0, '#ffffff');
    bodyGrad.addColorStop(0.3, p.color);
    bodyGrad.addColorStop(1, hexToRgba(p.color, 0.53));
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Terminator shadow for a stronger spherical 3D feel.
    const shadowGrad = ctx.createRadialGradient(px + radius * 0.3, py + radius * 0.3, radius * 0.2, px, py, radius * 1.15);
    shadowGrad.addColorStop(0, 'rgba(0,0,0,0)');
    shadowGrad.addColorStop(1, 'rgba(0,0,0,0.42)');
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fillStyle = shadowGrad;
    ctx.fill();
  }

  // Orbit trail
  ctx.beginPath();
  drawOrbitPath(cx, cy, orbitRadius, orbitRadius * orbitTilt, p.angle - 0.5, p.angle);
  ctx.strokeStyle = hexToRgba(p.color, 0.25);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Label
  if (isHovered || isTouchDevice) {
    ctx.fillStyle = isHovered ? p.color : 'rgba(255,255,255,0.95)';
    ctx.font = `700 ${isHovered ? 11 : 9}px "Inter", "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.shadowBlur = 4;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.fillText(p.label, px, py + radius + (isTouchDevice ? 6 : 8));
    ctx.shadowBlur = 0;
  }

  p._px = px;
  p._py = py;
}

function drawMouse(cx, cy) {
  // Gravitational warp lines
  planets.forEach(p => {
    const dx = p._px - mx;
    const dy = p._py - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const warpRange = isTouchDevice ? 120 : 200;
    if (dist < warpRange) {
      const alpha = (1 - dist / warpRange) * 0.15;
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(p._px, p._py);
      ctx.strokeStyle = `rgba(100,180,255,${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  });
}



// =========================================
// MAIN LOOP
// =========================================
function loop() {
  requestAnimationFrame(loop);
  t += 0.016;

  // Smooth mouse
  mx += (targetMx - mx) * 0.08;
  my += (targetMy - my) * 0.08;

  // Camera follows mouse subtly
  const mouseInfluence = 0.04;
  camTargetX = (mx - W / 2) * mouseInfluence;
  camTargetY = (my - H / 2) * mouseInfluence;
  camX += (camTargetX - camX) * 0.05;
  camY += (camTargetY - camY) * 0.05;

  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
  bg.addColorStop(0, '#00030f');
  bg.addColorStop(1, '#000005');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2 - camX;
  const cy = H / 2 - camY;

  drawStars(cx - W/2, cy - H/2);

  // Orbits
  planets.forEach(p => drawOrbit(cx, cy, p.orbitR * orbitScale, hoveredPlanet === p));

  drawSun(cx, cy);

  // Update planet angles
  const mdx = targetMx - W / 2;
  const mdy = targetMy - H / 2;
  planets.forEach(p => {
    // Mouse gravity slightly accelerates nearby planets.
    const toMouseAngle = Math.atan2(mdy, mdx);
    const angleDiff = toMouseAngle - p.angle;
    const gravityBoost = 1 + (isTouchDevice ? 0.3 : 0.55) * Math.abs(Math.sin(angleDiff * 0.5));
    p.angle += p.speed * gravityBoost;
    drawPlanet(p, cx, cy);
  });

  drawMouse(cx, cy);

  // Cursor trails on canvas
  trails.forEach((tr, i) => {
    const alpha = (i / trails.length) * 0.5;
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,180,255,${alpha})`;
    ctx.fill();
  });
}

// =========================================
// HOVER DETECTION
// =========================================
function handleHover(clientX, clientY) {
  if (isTouchDevice) return;
  let found = null;

  planets.forEach(p => {
    if (!p._px) return;
    const dx = clientX - p._px;
    const dy = clientY - p._py;
    if (Math.sqrt(dx * dx + dy * dy) < p.r * 2) {
      found = p;
    }
  });

  hoveredPlanet = found;

  if (found) {
    cursorRing.style.transform = 'translate(-50%, -50%) scale(2)';
    cursorRing.style.borderColor = found.color;
    cursorCore.style.background = found.color;
    labelEl.style.display = 'block';
    labelEl.style.left = clientX + 16 + 'px';
    labelEl.style.top = clientY + 16 + 'px';
    labelEl.textContent = found.label;
    document.body.style.cursor = 'none';
  } else {
    cursorRing.style.transform = 'translate(-50%, -50%) scale(1)';
    cursorRing.style.borderColor = 'rgba(255,255,255,0.5)';
    cursorCore.style.background = '#fff';
    labelEl.style.display = 'none';
  }

  // Sun hover
  const sdx = clientX - (W/2 - camX);
  const sdy = clientY - (H/2 - camY);
  if (Math.sqrt(sdx*sdx + sdy*sdy) < sun.r * 1.5) {
    cursorRing.style.borderColor = '#ffd060';
    cursorRing.style.transform = 'translate(-50%, -50%) scale(2.5)';
    cursorCore.style.background = '#ffd060';
    labelEl.style.display = 'block';
    labelEl.style.left = clientX + 16 + 'px';
    labelEl.style.top = clientY + 16 + 'px';
    labelEl.textContent = 'MANNAN / CORE';
  }
}

document.addEventListener('mousemove', e => handleHover(e.clientX, e.clientY));
document.addEventListener('touchmove', e => {
  if (e.touches.length > 0) {
    handleHover(e.touches[0].clientX, e.touches[0].clientY);
  }
}, {passive: true});

// =========================================
// CLICK — OPEN PANEL
// =========================================
function openPanel(id) {
  if (id === 'resume') {
    window.open('Resume.pdf', '_blank');
    toast('Transmitting Resume Data...');
    return;
  }
  const data = PANEL_DATA[id];
  if (!data) return;

  const panel = document.getElementById('panel');
  const content = document.getElementById('panel-content');

  content.innerHTML = `
    <div class="panel-tag">${data.tag}</div>
    <h2 class="panel-title">${data.title}</h2>
    ${data.html}
  `;

  panel.classList.add('active');
  toast('Section opened - press ESC to close');

  // Animate skill bars
  setTimeout(() => {
    content.querySelectorAll('.skill-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 150);

  // Update bottom nav
  document.querySelectorAll('.nav-planet').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === id);
  });

  // Handle Contact Form AJAX
  if (id === 'contact') {
    const form = content.querySelector('.contact-form');
    const result = document.getElementById('form-result');

    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(form);
        const object = Object.fromEntries(formData);
        const json = JSON.stringify(object);

        result.innerHTML = "Initializing transmission...";
        result.style.color = "var(--accent)";

        fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: json
        })
        .then(async (response) => {
          let json = await response.json();
          if (response.status == 200) {
            result.innerHTML = "Message successfully transmitted to the core.";
            result.style.color = "#7df0cc";
            form.reset();
          } else {
            console.log(response);
            result.innerHTML = json.message;
            result.style.color = "var(--danger-soft)";
          }
        })
        .catch(error => {
          console.log(error);
          result.innerHTML = "Transmission failure. Please check your signal.";
          result.style.color = "var(--danger-soft)";
        })
        .then(function() {
          setTimeout(() => {
            result.innerHTML = "";
          }, 5000);
        });
      });
    }
  }
}

function toast(message) {
  if (!toastEl) return;
  toastEl.textContent = message;
  toastEl.classList.add('show');
  clearTimeout(toastEl._timer);
  toastEl._timer = setTimeout(() => {
    toastEl.classList.remove('show');
  }, 1800);
}

canvas.addEventListener('click', e => {
  let opened = false;
  planets.forEach(p => {
    if (!p._px) return;
    const dx = e.clientX - p._px;
    const dy = e.clientY - p._py;
    if (Math.sqrt(dx * dx + dy * dy) < p.r * 2.5) {
      openPanel(p.id);
      opened = true;
    }
  });
  if (!opened) {
    const sdx = e.clientX - (W / 2 - camX);
    const sdy = e.clientY - (H / 2 - camY);
    if (Math.sqrt(sdx * sdx + sdy * sdy) < sun.r * 1.4) {
      targetMx = W / 2;
      targetMy = H / 2;
      toast('Camera re-centered');
    }
  }
});

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 0) return;
  const touch = e.touches[0];
  updateCursor(touch.clientX, touch.clientY);
  let opened = false;
  planets.forEach(p => {
    if (!p._px) return;
    const dx = touch.clientX - p._px;
    const dy = touch.clientY - p._py;
    if (Math.sqrt(dx * dx + dy * dy) < p.r * 2.8) {
      openPanel(p.id);
      opened = true;
    }
  });
  if (!opened) {
    const sdx = touch.clientX - (W / 2 - camX);
    const sdy = touch.clientY - (H / 2 - camY);
    if (Math.sqrt(sdx * sdx + sdy * sdy) < sun.r * 1.4) {
      targetMx = W / 2;
      targetMy = H / 2;
      toast('System centered');
    }
  }
}, {passive: true});

document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('panel').classList.remove('active');
  document.querySelectorAll('.nav-planet').forEach(btn => btn.classList.remove('active'));
  toast('Closed');
});

document.querySelectorAll('.nav-planet').forEach(btn => {
  btn.addEventListener('click', () => openPanel(btn.dataset.id));
});

document.getElementById('panel').addEventListener('click', e => {
  if (e.target === document.getElementById('panel')) {
    document.getElementById('panel').classList.remove('active');
    document.querySelectorAll('.nav-planet').forEach(btn => btn.classList.remove('active'));
    toast('Closed');
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const panel = document.getElementById('panel');
    if (panel.classList.contains('active')) {
      panel.classList.remove('active');
      document.querySelectorAll('.nav-planet').forEach(btn => btn.classList.remove('active'));
      toast('Closed');
    }
  }
});

setTimeout(() => {
  toast(isTouchDevice ? 'Tap planets to explore' : 'Hover + click planets to explore');
}, 600);

// Start
loop();
</script>
